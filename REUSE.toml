version = 1

# ---------------------------------------------------------------------------
# Files with no license header — Apache-2.0 (Khronos default for unheadered)
# ---------------------------------------------------------------------------

[[annotations]]
path = [
    "**.md",
    ".clang-format",
    ".gitattributes",
    ".gitignore",
    ".mailmap",
    "_config.yml",
    "known_good.json",
    "known_good_khr.json",
    "license-checker.cfg",
    "LICENSE.txt",
    ".github/dependabot.yml",
    ".github/workflows/*.yml",
    ".github/workflows/*.js",
    "glslang/OSDependent/Web/glslang.pre.js",
    "glslang/OSDependent/Web/glslang.after.js",
    "Test/**",
    "External/**",
]
SPDX-FileCopyrightText = "2026 The Khronos Group, Inc."
SPDX-License-Identifier = "Apache-2.0"

# ---------------------------------------------------------------------------
# Required by Kokoro — CC0-1.0
# ---------------------------------------------------------------------------

[[annotations]]
path = "LICENSES/**"
precedence = "aggregate"
SPDX-FileCopyrightText = "NONE"
SPDX-License-Identifier = "CC0-1.0"

[[annotations]]
path = "REUSE.toml"
precedence = "aggregate"
SPDX-FileCopyrightText = "NONE"
SPDX-License-Identifier = "CC0-1.0"

